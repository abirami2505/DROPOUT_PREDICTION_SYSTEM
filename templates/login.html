<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — EduGuard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07111f;--bg2:#0d1b2e;--card:#0f2035;--card2:#122540;
  --border:#1a3050;--border2:#1f3a5f;
  --blue:#3b82f6;--blue2:#60a5fa;--blue-glow:rgba(59,130,246,.18);
  --red:#ef4444;--red-glow:rgba(239,68,68,.15);
  --yellow:#f59e0b;--yellow-glow:rgba(245,158,11,.15);
  --green:#10b981;--green-glow:rgba(16,185,129,.15);
  --t1:#f0f6ff;--t2:#94a3b8;--t3:#4b637f;
  --r:12px;--r2:18px;
  --sh:0 4px 24px rgba(0,0,0,.4);
  --sh2:0 12px 48px rgba(0,0,0,.6);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;display:flex;flex-direction:column;line-height:1.6}

/* ── NAVBAR ── */
.nav{position:sticky;top:0;z-index:99;height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;background:rgba(7,17,31,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;font-family:'Sora',sans-serif;font-weight:700;font-size:18px;color:var(--t1)}
.nav-logo .icon{width:34px;height:34px;background:linear-gradient(135deg,var(--blue),#818cf8);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px}
.nav-links{display:flex;align-items:center;gap:6px}
.nav-a{font-size:14px;font-weight:500;color:var(--t2);text-decoration:none;padding:7px 16px;border-radius:9px;transition:.2s}
.nav-a:hover{color:var(--t1);background:var(--border)}

/* ── FOOTER ── */
.footer{margin-top:auto;background:var(--bg2);border-top:1px solid var(--border);padding:36px 40px}
.footer-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.footer-brand{display:flex;align-items:center;gap:10px;font-family:'Sora',sans-serif;font-weight:700;font-size:16px;color:var(--t1)}
.footer-brand .icon{width:30px;height:30px;background:linear-gradient(135deg,var(--blue),#818cf8);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px}
.footer-copy{font-size:13px;color:var(--t3)}
.footer-links{display:flex;gap:20px}
.footer-links a{font-size:13px;color:var(--t3);text-decoration:none;transition:.2s}
.footer-links a:hover{color:var(--t2)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:7px;font-size:14px;font-weight:600;padding:10px 22px;border-radius:10px;border:none;cursor:pointer;text-decoration:none;transition:.2s;letter-spacing:.01em;font-family:'Inter',sans-serif}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#2563eb;box-shadow:0 4px 20px rgba(59,130,246,.35);transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--t2);border:1px solid var(--border2)}
.btn-outline:hover{background:var(--card);color:var(--t1)}
.btn-ghost{background:transparent;color:var(--t3);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--card);color:var(--t2)}
.btn-lg{padding:13px 32px;font-size:15px;border-radius:12px}
.btn-full{width:100%;justify-content:center;padding:12px;font-size:15px}

/* ── FORMS ── */
.label{display:block;font-size:13px;font-weight:600;color:var(--t2);margin-bottom:7px;letter-spacing:.02em}
.input{width:100%;padding:11px 15px;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;color:var(--t1);font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:.2s}
.input::placeholder{color:var(--t3)}
.input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-glow)}
.input[type=file]{cursor:pointer;color:var(--t2);padding:9px 14px}
.input[type=file]::-webkit-file-upload-button{background:var(--blue);color:#fff;border:none;padding:6px 14px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;margin-right:12px;font-family:'Inter',sans-serif}
.fg{margin-bottom:18px}

/* ── CARD ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:36px}
.card-sm{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:22px}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;gap:7px;background:var(--blue-glow);border:1px solid rgba(59,130,246,.3);color:var(--blue2);font-size:13px;font-weight:600;padding:5px 15px;border-radius:100px;margin-bottom:24px}
.badge .dot{width:6px;height:6px;background:var(--blue2);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── DIVIDER ── */
.div{width:44px;height:3px;background:linear-gradient(90deg,var(--blue),#818cf8);border-radius:2px;margin:10px 0 22px}

/* ── RISK BADGES ── */
.risk{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:3px 11px;border-radius:100px;letter-spacing:.04em}
.risk-dot{width:5px;height:5px;border-radius:50%}
.rh{background:var(--red-glow);color:#fca5a5;border:1px solid rgba(239,68,68,.3)}
.rh .risk-dot{background:var(--red)}
.rm{background:var(--yellow-glow);color:#fcd34d;border:1px solid rgba(245,158,11,.3)}
.rm .risk-dot{background:var(--yellow)}
.rl{background:var(--green-glow);color:#6ee7b7;border:1px solid rgba(16,185,129,.3)}
.rl .risk-dot{background:var(--green)}

/* ── STAT CARDS ── */
.sc{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:22px}
.sc.danger{border-color:rgba(239,68,68,.3)}
.sc.warn{border-color:rgba(245,158,11,.3)}
.sc.ok{border-color:rgba(16,185,129,.3)}
.sc-ico{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.danger .sc-ico{background:var(--red-glow)}
.warn .sc-ico{background:var(--yellow-glow)}
.ok .sc-ico{background:var(--green-glow)}
.sc-val{font-family:'Sora',sans-serif;font-size:30px;font-weight:800;line-height:1;margin-bottom:3px}
.danger .sc-val{color:var(--red)}
.warn .sc-val{color:var(--yellow)}
.ok .sc-val{color:var(--green)}
.sc-lbl{font-size:13px;color:var(--t2)}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--bg2);border-bottom:1px solid var(--border)}
th{padding:12px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
td{padding:14px 16px;font-size:14px;color:var(--t2);border-bottom:1px solid var(--border)}
tbody tr:hover{background:var(--bg2)}
tbody tr:last-child td{border-bottom:none}
td:first-child{font-weight:600;color:var(--t1)}

/* ── ALERT ── */
.alert{padding:11px 15px;border-radius:10px;font-size:14px;margin-bottom:18px;display:flex;align-items:center;gap:9px}
.alert-err{background:var(--red-glow);border:1px solid rgba(239,68,68,.3);color:#fca5a5}

/* ── MISC ── */
.wrap{max-width:1200px;margin:0 auto;padding:0 24px}
.wrap-sm{max-width:460px;margin:0 auto;padding:0 24px}
.section-lbl{font-size:12px;font-weight:700;color:var(--blue2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px}
@media(max-width:680px){.grid-3{grid-template-columns:1fr}.nav{padding:0 16px}.footer-inner{flex-direction:column;text-align:center}}
</style>

<style>
.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px}
.auth-box{width:100%;max-width:440px}
.auth-ico{width:48px;height:48px;background:var(--blue-glow);border:1px solid rgba(59,130,246,.3);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:14px}
.auth-title{font-family:'Sora',sans-serif;font-size:24px;font-weight:700;margin-bottom:5px}
.auth-sub{font-size:14px;color:var(--t2);margin-bottom:28px}
.form-foot{margin-top:20px;text-align:center;font-size:13px;color:var(--t3)}
.form-foot a{color:var(--blue2);text-decoration:none;font-weight:600}
.form-foot a:hover{text-decoration:underline}
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo"><div class="icon">🎓</div>EduGuard</a>
  <div class="nav-links">
    <a href="/signup" class="nav-a">Create account</a>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-box">
    <div class="card">
      <div class="auth-ico">🔐</div>
      <div class="auth-title">Welcome back</div>
      <div class="auth-sub">Sign in to your counsellor account to access the prediction dashboard.</div>

      {% if error %}
      <div class="alert alert-err">⚠ {{ error }}</div>
      {% endif %}

      <form action="/login" method="POST">
        <div class="fg">
          <label class="label">Email Address</label>
          <input class="input" type="email" name="email" placeholder="you@institution.edu" required>
        </div>
        <div class="fg">
          <label class="label">Password</label>
          <input class="input" type="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full" style="margin-top:4px">Sign In →</button>
      </form>

      <div class="form-foot">Don't have an account? <a href="/signup">Create one</a></div>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-brand"><div class="icon">🎓</div>EduGuard</div>
    <div class="footer-copy">© 2025 EduGuard — Student Dropout Prediction System</div>
    
  </div>
</footer>

</body></html>
